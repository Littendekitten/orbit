<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Orbit AI</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .chat-box { width: 90%; max-width: 600px; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        #chat { height: 400px; overflow-y: auto; border-bottom: 1px solid #444; margin-bottom: 10px; }
        input { width: 75%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div id="chat"></div>
        <input type="text" id="userInput" placeholder="Vraag Orbit wat...">
        <button onclick="send()">Verzend</button>
    </div>

    <script>
       
        const BACKEND_URL = "https://option-artists-various-thru.trycloudflare.com";

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value;
            
            chat.innerHTML += `<p><b>Jij:</b> ${message}</p>`;
            input.value = '';

            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            chat.innerHTML += `<p><b>Orbit:</b> ${data.reply}</p>`;
        }
    </script>
</body>
</html>
