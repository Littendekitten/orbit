<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit AI Interface</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #chat-box { height: 300px; overflow-y: scroll; border: 1px solid #eee; margin-bottom: 10px; padding: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>Orbit AI</h2>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Stel een vraag aan Orbit...">
        <button onclick="sendMessage()">Verzend</button>
    </div>

    <script>
        // Hier staat je vaste URL!
        const BACKEND_URL = "https://roaming-travesty-retold.ngrok-free.dev";

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value;

            if (!message) return;

            // Toon eigen bericht
            chatBox.innerHTML += `<p><b>Jij:</b> ${message}</p>`;
            inputField.value = '';

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Toon antwoord van Orbit
                chatBox.innerHTML += `<p><b>Orbit:</b> ${data.reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red;"><b>Fout:</b> Kan geen verbinding maken met Orbit.</p>`;
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
