<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit AI - Cloud Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 90%;
            max-width: 500px;
            height: 70vh;
            background-color: #1e293b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .user {
            background-color: #3b82f6;
            align-self: flex-end;
        }
        .orbit {
            background-color: #334155;
            align-self: flex-start;
        }
        #input-area {
            display: flex;
            padding: 10px;
            background-color: #0f172a;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #1e293b;
            color: white;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <h1 style="color: #3b82f6;">Orbit AI 🚀</h1>
    <p style="color: #94a3b8; font-size: 0.9rem;">Status: 24/7 Cloud Connected</p>

    <div id="chat-container">
        <div id="chat-window" id="chatWindow"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Typ een bericht naar Orbit..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Verzend</button>
        </div>
    </div>

    <script>
        // ==========================================
        // BELANGRiJK: Vervang deze URL straks met jouw echte Render URL!
        // Bijvoorbeeld: "https://orbit-ai-server.onrender.com"
        // ==========================================
        const RENDER_URL = "HOOGNODIG_HIER_JE_RENDER_URL_PLAKKEN";

        // Genereer een uniek ID voor deze gebruiker als die er nog niet is
        let userId = localStorage.getItem('orbit_cloud_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('orbit_cloud_user_id', userId);
        }

        const chatWindow = document.getElementById('chat-window');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const message = inputField.value.trim();
            
            if (message === "") return;

            // Toon jouw bericht op het scherm
            appendMessage(message, 'user');
            inputField.value = "";

            if (RENDER_URL === "HOOGNODIG_HIER_JE_RENDER_URL_PLAKKEN") {
                appendMessage("Systeemfout: Je moet de RENDER_URL nog aanpassen in de HTML-code!", 'orbit');
                return;
            }

            try {
                // Stuur het bericht naar de Render server
                const response = await fetch(`${RENDER_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                const data = await response.json();
                
                // Toon het antwoord van Orbit
                appendMessage(data.reply, 'orbit');

            } catch (error) {
                console.error("Fout:", error);
                appendMessage("Oeps! Ik kon geen verbinding maken met de cloud-server. Staat Render wel aan?", 'orbit');
            }
        }
    </script>
</body>
</html>
