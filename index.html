<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SpaceStar AI Interface</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #343541; color: #ececf1; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .message { padding: 20px; border-radius: 5px; margin-bottom: 5px; }
        .user { background-color: #343541; }
        .ai { background-color: #444654; }
        .input-area { padding: 20px; border-top: 1px solid #4d4d4f; background: #343541; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #565869; background: #40414f; color: white; }
        button { padding: 10px 20px; background: #19c37d; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-window">
        <div class="message ai">🛰️ Orbit: Hallo! Waar kan ik je vandaag bij helpen?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Typ je bericht aan SpaceStar...">
        <button onclick="sendMessage()">Verzend</button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        if (!input.value) return;

        chat.innerHTML += `<div class="message user">👤 Jij: ${input.value}</div>`;
        
        // Hier zou normaal de verbinding met je Python script komen
        chat.innerHTML += `<div class="message ai">🛰️ Orbit denkt na...</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
