<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit AI Chat</title>
    <style>
        /* Algemene styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 800px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .header { background: #2c3e50; color: white; padding: 15px 20px; font-size: 1.2em; font-weight: bold; }
        
        /* Chat venster */
        #chat-box { height: 500px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background-color: #d1e7dd; align-self: flex-end; border-bottom-right-radius: 0; color: #0f5132; }
        .bot-msg { background-color: #f8f9fa; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #e9ecef; color: #333; }
        
        /* Input gebied */
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; outline: none; }
        input:focus { border-color: #2c3e50; }
        button.send-btn { background: #2c3e50; color: white; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-size: 1em; transition: 0.2s; }
        button.send-btn:hover { background: #1a252f; }

        /* --- DE MAGIE VOOR CODE BLOKKEN --- */
        .code-container { background: #1e1e1e; border-radius: 8px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        .code-header { background: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; color: #ccc; font-size: 0.85em; font-family: sans-serif; border-bottom: 1px solid #444; }
        .code-content { margin: 0; padding: 15px; overflow-x: auto; color: #d4d4d4; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; white-space: pre-wrap; }
        .copy-btn { background: #4caf50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .copy-btn:hover { background: #45a049; }
        .copy-btn.copied { background: #2e7d32; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="header">🛰️ Orbit AI Terminal</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Stel een vraag aan Orbit (bijv. 'schrijf een python script')..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">Verzend</button>
        </div>
    </div>

    <script>
        // Jouw vaste Ngrok URL
        const BACKEND_URL = "[https://roaming-travesty-retold.ngrok-free.dev](https://roaming-travesty-retold.ngrok-free.dev)";

        // Functie om enter toets op te vangen
        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // DE PARSER: Zoekt naar ``` code ``` en maakt er een mooi blok van
        function formatOrbitText(text) {
            // Regex zoekt naar alles tussen 3 backticks
            const codeRegex = /```([a-zA-Z]*)\n([\s\S]*?)```/g;
            
            // Vervang de ruwe tekst door HTML
            let formattedText = text.replace(codeRegex, function(match, language, code) {
                const langLabel = language ? language.toUpperCase() : 'CODE';
                
                // Beveiliging: zorg dat HTML in de code niet de website breekt (< en > vervangen)
                const safeCode = code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim();
                
                // Genereer een uniek ID voor de kopieer-knop
                const uniqueId = 'code-' + Math.random().toString(36).substr(2, 9);

                return `
                    <div class="code-container">
                        <div class="code-header">
                            <span>${langLabel}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${uniqueId}', this)">Kopieer</button>
                        </div>
                        <pre class="code-content" id="${uniqueId}">${safeCode}</pre>
                    </div>
                `;
            });

            // Vervang eventuele losse enters door HTML breaks zodat normale tekst ook netjes blijft
            return formattedText.replace(/\n/g, '<br>');
        }

        // De Kopieer functie
        function copyToClipboard(elementId, button) {
            const codeText = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                // Verander de knop tijdelijk voor visuele feedback
                button.innerText = 'Gekopieerd! ✔';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.innerText = 'Kopieer';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Kon niet kopiëren: ', err);
            });
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // Toon eigen bericht met de nieuwe styling
            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Stuur Orbit's antwoord door de formatter!
                const formattedReply = formatOrbitText(data.reply);

                // Toon het geformatteerde antwoord
                chatBox.innerHTML += `<div class="message bot-msg"><b>Orbit:</b><br>${formattedReply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                chatBox.innerHTML += `<div class="message bot-msg" style="color:red;"><b>Systeem Fout:</b> Kan geen verbinding maken met de Orbit server. Check of Ngrok en je app.py draaien.</div>`;
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
