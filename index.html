<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit AI Terminal</title>
    <style>
        /* CSS Reset & Basis */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #131314; /* Gemini Dark Background */
            color: #e3e3e3; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden; /* Voorkomt scrollen van de hele pagina op mobiel */
        }
        
        #app-container { 
            width: 100%; 
            max-width: 900px; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }

        /* Header styling */
        .header { 
            padding: 15px 20px; 
            font-size: 1.2em; 
            font-weight: 500; 
            border-bottom: 1px solid #333; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Chat venster */
        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            scroll-behavior: smooth;
        }
        
        /* Berichten algemeen */
        .message { 
            display: flex; 
            flex-direction: column; 
            line-height: 1.6; 
            font-size: 1rem;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Jij (Gebruiker) styling */
        .user-msg { 
            align-self: flex-end; 
            background-color: #303134; 
            padding: 12px 18px; 
            border-radius: 20px; 
            border-bottom-right-radius: 4px;
            max-width: 85%; 
        }

        /* Orbit styling */
        .bot-msg { 
            align-self: flex-start; 
            max-width: 100%; 
        }
        .bot-msg b { color: #8ab4f8; font-size: 1.1em; display: inline-block; margin-bottom: 5px; } 

        /* Input gebied */
        .input-area { 
            padding: 15px 20px; 
            padding-bottom: 30px; /* Extra ruimte voor iPhone balkje onderin */
            background: #131314; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333;
        }
        
        input { 
            flex: 1; 
            background-color: #1e1f20; 
            color: white; 
            border: 1px solid #444; 
            padding: 14px 20px; 
            border-radius: 25px; 
            font-size: 1rem; 
            outline: none; 
            transition: 0.2s border-color; 
        }
        input:focus { border-color: #8ab4f8; }
        
        button.send-btn { 
            background-color: transparent; 
            color: #8ab4f8; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            padding: 0 15px; 
            font-size: 1rem;
            transition: 0.2s color;
        }
        button.send-btn:hover { color: #aecbfa; }

        /* Code Blokken Styling */
        .code-container { 
            background: #1e1e1e; 
            border-radius: 12px; 
            margin: 12px 0; 
            overflow: hidden; 
            border: 1px solid #333; 
        }
        .code-header { 
            background: #2d2d2d; 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: #aaa; 
            font-size: 0.85rem; 
        }
        .code-content { 
            margin: 0; 
            padding: 15px; 
            overflow-x: auto; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 0.9rem; 
            color: #d4d4d4; 
        }
        .copy-btn { 
            background: transparent; 
            color: #aaa; 
            border: 1px solid #555; 
            padding: 4px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .copy-btn:hover { background: #444; color: white; }
        .copy-btn.copied { background: #8ab4f8; color: #131314; border-color: #8ab4f8; }

        /* Animaties */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobiele optimalisatie */
        @media (max-width: 600px) {
            .input-area { padding: 10px; padding-bottom: 20px; }
            .user-msg { max-width: 90%; }
            .header { padding: 10px 15px; font-size: 1.1em; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header">✨ Orbit AI</div>
        
        <div id="chat-box">
            <div class="message bot-msg"><b>Orbit</b><br>Hallo! Ik ben klaar voor actie. Wat gaan we vandaag bouwen?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Vraag Orbit iets..." onkeypress="handleEnter(event)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">Stuur</button>
        </div>
    </div>

    <script>
        // Jouw vaste Ngrok URL
        const BACKEND_URL = "https://roaming-travesty-retold.ngrok-free.dev";

        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // De nieuwe, slimmere parser
        function formatOrbitText(text) {
            const codeBlocks = [];
            const codeRegex = /```([a-zA-Z]*)\n([\s\S]*?)```/g;
            
            // Stap 1: Haal de codeblokken er tijdelijk uit zodat normale enters ze niet kapot maken
            let tempText = text.replace(codeRegex, function(match, language, code) {
                codeBlocks.push({ language, code });
                return `___CODEBLOCK_${codeBlocks.length - 1}___`;
            });

            // Stap 2: Zet gewone enters om in HTML <br> tags
            tempText = tempText.replace(/\n/g, '<br>');

            // Stap 3: Zet de codeblokken netjes terug met de nieuwe styling
            codeBlocks.forEach((block, index) => {
                const langLabel = block.language ? block.language.toUpperCase() : 'CODE';
                const safeCode = block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim();
                const uniqueId = 'code-' + Math.random().toString(36).substr(2, 9);
                
                const codeHTML = `
                    <div class="code-container">
                        <div class="code-header">
                            <span>${langLabel}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${uniqueId}', this)">Kopieer</button>
                        </div>
                        <pre class="code-content" id="${uniqueId}">${safeCode}</pre>
                    </div>
                `;
                tempText = tempText.replace(`___CODEBLOCK_${index}___`, codeHTML);
            });

            return tempText;
        }

        function copyToClipboard(elementId, button) {
            const codeText = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                button.innerText = 'Gekopieerd!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.innerText = 'Kopieer';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Kon niet kopiëren: ', err);
            });
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // Toon jouw bericht
            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Ngrok Bypass!
                    },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error("Netwerk respons was niet oké.");

                const data = await response.json();
                const formattedReply = formatOrbitText(data.reply);

                // Toon Orbit's antwoord
                chatBox.innerHTML += `<div class="message bot-msg"><b>Orbit</b><br>${formattedReply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                chatBox.innerHTML += `<div class="message bot-msg" style="color:#ff8a8a;"><b>Systeemwaarschuwing</b><br>Kan geen verbinding maken met Orbit. Draait je Ngrok tunnel nog?</div>`;
                console.error("Error:", error);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
