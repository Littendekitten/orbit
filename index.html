<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit AI Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #131314; 
            color: #e3e3e3; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background-color: #1e1f20;
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-right: 1px solid #333;
            transition: 0.3s;
        }
        .new-chat-btn {
            background: #2a2b2d;
            color: #8ab4f8;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #333537; }
        
        .chat-list-title {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 5px;
        }
        #chat-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .chat-list-item {
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-list-item span.title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }
        .chat-list-item:hover { background-color: #2a2b2d; }
        .chat-list-item.active { background-color: #004a77; color: #c2e7ff; }

        .delete-btn, .rename-btn {
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
            user-select: none;
        }
        .delete-btn:hover, .rename-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .auth-section {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
        }
        .auth-btn {
            display: block;
            background: #4285F4;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .auth-btn:hover { background: #357ae8; }
        .logout-link {
            color: #ff8a8a;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }
        .logout-link:hover { text-decoration: underline; }

        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header { 
            padding: 18px 24px; 
            font-size: 1.25rem; 
            border-bottom: 1px solid #333; 
            font-weight: 500;
        }
        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .message { display: flex; flex-direction: column; line-height: 1.6; }
        .user-msg { 
            align-self: flex-end; 
            background-color: #303134; 
            padding: 12px 20px; 
            border-radius: 20px; 
            border-bottom-right-radius: 4px;
            max-width: 80%; 
        }
        .bot-msg { align-self: flex-start; max-width: 100%; }
        .bot-msg b { color: #8ab4f8; font-size: 1.05rem; }

        .input-container {
            padding: 20px;
            background: #131314;
        }
        .input-area { 
            max-width: 800px;
            margin: 0 auto;
            background-color: #1e1f20; 
            border: 1px solid #444; 
            border-radius: 30px; 
            display: flex; 
            align-items: center;
            padding: 6px 15px;
        }
        input { 
            flex: 1; 
            background: transparent;
            color: white; 
            border: none;
            padding: 12px; 
            font-size: 1rem; 
            outline: none; 
        }
        button.send-btn { 
            background: transparent; 
            color: #8ab4f8; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            padding: 0 10px;
            font-size: 1rem;
        }
        button.send-btn:hover { color: #aecbfa; }

        .code-container { background: #1e1e1e; border-radius: 12px; margin: 12px 0; overflow: hidden; border: 1px solid #333; }
        .code-header { background: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; color: #aaa; font-size: 0.8rem; }
        .code-content { margin: 0; padding: 15px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 0.9rem; color: #d4d4d4; }
        .copy-btn { background: transparent; color: #aaa; border: 1px solid #555; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .copy-btn:hover { background: #444; color: white; }
        .copy-btn.copied { background: #8ab4f8; color: #131314; border-color: #8ab4f8; }

        @media (max-width: 768px) {
            #sidebar { width: 70px; padding: 8px; }
            .new-chat-btn { font-size: 1.2rem; border-radius: 50%; padding: 10px; margin-bottom: 10px; }
            .new-chat-btn span { display: none; }
            .new-chat-btn::before { content: "+"; }
            .chat-list-title, .chat-list-item, .auth-section { display: none; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-chat-btn" onclick="startNewChat()"><span>+ New chat</span></div>
        <div class="chat-list-title">Recent chats</div>
        <div id="chat-list"></div>
        <div id="auth-section" class="auth-section"></div>
    </div>

    <div id="main-content">
        <div class="header">✨ Orbit AI</div>
        <div id="chat-box"></div>
        
        <div class="input-container">
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask Orbit anything..." onkeypress="handleEnter(event)" autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://roaming-travesty-retold.ngrok-free.dev";
        
        let allChats = JSON.parse(localStorage.getItem('orbit_chats')) || [];
        let activeChatId = localStorage.getItem('orbit_active_id') || null;

        window.onload = function() {
            checkUserStatus();
            if (allChats.length === 0 || !activeChatId) {
                startNewChat();
            } else {
                renderSidebar();
                loadChat(activeChatId);
            }
        };

        async function checkUserStatus() {
            const authSection = document.getElementById('auth-section');
            try {
                const response = await fetch(`${BACKEND_URL}/user`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    authSection.innerHTML = `
                        <div>Logged in as:</div>
                        <strong style="color: #8ab4f8;">${data.user.name}</strong>
                        <br><a class="logout-link" href="${BACKEND_URL}/logout">Logout</a>
                    `;
                } else {
                    authSection.innerHTML = `<a class="auth-btn" href="${BACKEND_URL}/login">Login with Google</a>`;
                }
            } catch (error) {
                authSection.innerHTML = `<a class="auth-btn" href="${BACKEND_URL}/login">Login with Google</a>`;
            }
        }

        function startNewChat() {
            const newId = 'chat_' + Date.now();
            const newChat = {
                id: newId,
                title: "New conversation",
                history: []
            };
            allChats.unshift(newChat);
            activeChatId = newId;
            saveToStorage();
            renderSidebar();
            loadChat(newId);
        }

        function saveToStorage() {
            localStorage.setItem('orbit_chats', JSON.stringify(allChats));
            localStorage.setItem('orbit_active_id', activeChatId);
        }

        function renderSidebar() {
            const listContainer = document.getElementById('chat-list');
            listContainer.innerHTML = '';
            
            allChats.forEach(chat => {
                const isActive = chat.id === activeChatId ? 'active' : '';
                listContainer.innerHTML += `
                    <div class="chat-list-item ${isActive}" onclick="loadChat('${chat.id}')">
                        <span class="title">${chat.title}</span>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span class="rename-btn" onclick="renameChat('${chat.id}', event)" title="Rename chat">✏️</span>
                            <span class="delete-btn" onclick="deleteChat('${chat.id}', event)" title="Delete chat">🗑️</span>
                        </div>
                    </div>
                `;
            });
        }

        function renameChat(chatId, event) {
            event.stopPropagation();
            const chat = allChats.find(c => c.id === chatId);
            if (!chat) return;
            
            const newTitle = prompt("Enter new chat title:", chat.title);
            if (newTitle && newTitle.trim() !== "") {
                chat.title = newTitle.trim();
                saveToStorage();
                renderSidebar();
            }
        }

        function deleteChat(chatId, event) {
            event.stopPropagation(); 
            
            if (!confirm("Are you sure you want to delete this chat?")) return;

            allChats = allChats.filter(c => c.id !== chatId);
            
            if (activeChatId === chatId) {
                if (allChats.length > 0) {
                    activeChatId = allChats[0].id;
                } else {
                    activeChatId = null;
                }
            }
            
            saveToStorage();
            
            if (activeChatId) {
                loadChat(activeChatId);
            } else {
                startNewChat();
            }
        }

        function loadChat(chatId) {
            activeChatId = chatId;
            renderSidebar();
            saveToStorage();
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            
            const currentChat = allChats.find(c => c.id === chatId);
            if (!currentChat || currentChat.history.length === 0) {
                chatBox.innerHTML = `<div class="message bot-msg"><b>Orbit</b><br>Hello! I am ready for a new conversation. What shall we do?</div>`;
                return;
            }

            currentChat.history.forEach(msg => {
                if (msg.role === 'user') {
                    chatBox.innerHTML += `<div class="message user-msg">${msg.text}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot-msg"><b>Orbit</b><br>${formatOrbitText(msg.text)}</div>`;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const messageText = inputField.value.trim();

            if (!messageText) return;

            const currentChat = allChats.find(c => c.id === activeChatId);
            
            if (currentChat.history.length === 0) {
                currentChat.title = messageText.substring(0, 20) + (messageText.length > 20 ? '...' : '');
                renderSidebar();
            }

            currentChat.history.push({ role: 'user', text: messageText });
            chatBox.innerHTML += `<div class="message user-msg">${messageText}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            saveToStorage();

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ history: currentChat.history })
                });

                const data = await response.json();
                
                currentChat.history.push({ role: 'assistant', text: data.reply });
                chatBox.innerHTML += `<div class="message bot-msg"><b>Orbit</b><br>${formatOrbitText(data.reply)}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                saveToStorage();

            } catch (error) {
                chatBox.innerHTML += `<div class="message bot-msg" style="color:#ff8a8a;"><b>System Warning</b><br>Unable to connect to Orbit.</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function formatOrbitText(text) {
            const codeBlocks = [];
            const codeRegex = /```([a-zA-Z]*)\n([\s\S]*?)```/g;
            
            let tempText = text.replace(codeRegex, function(match, language, code) {
                codeBlocks.push({ language, code });
                return `___CODEBLOCK_${codeBlocks.length - 1}___`;
            });

            tempText = tempText.replace(/\n/g, '<br>');

            codeBlocks.forEach((block, index) => {
                const langLabel = block.language ? block.language.toUpperCase() : 'CODE';
                const safeCode = block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;').trim();
                const uniqueId = 'code-' + Math.random().toString(36).substr(2, 9);
                
                const codeHTML = `
                    <div class="code-container">
                        <div class="code-header">
                            <span>${langLabel}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${uniqueId}', this)">Copy</button>
                        </div>
                        <pre class="code-content" id="${uniqueId}">${safeCode}</pre>
                    </div>
                `;
                tempText = tempText.replace(`___CODEBLOCK_${index}___`, codeHTML);
            });

            return tempText;
        }

        function copyToClipboard(elementId, button) {
            const codeText = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                button.innerText = 'Copied!';
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
